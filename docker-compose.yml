services:
  scanner:
    build:
      context: ./scanner
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SCANNER_CRON=${SCANNER_CRON:-*/1 * * * *}
      - SCANNER_AGGREGATOR_CRON=${SCANNER_AGGREGATOR_CRON:-*/10 * * * *}
      - SCANNER_SPAM_CRON=${SCANNER_SPAM_CRON:-*/15 * * * *}
      - SCANNER_AI_JOBS_CRON=${SCANNER_AI_JOBS_CRON:-*/1 * * * *}
      - SCANNER_REVENUE_COPILOT_CRON=${SCANNER_REVENUE_COPILOT_CRON:-*/1 * * * *}
      - SCANNER_MANAGER_COPILOT_CRON=${SCANNER_MANAGER_COPILOT_CRON:-*/1 * * * *}
      - SCANNER_BATCH_SIZE=${SCANNER_BATCH_SIZE:-1000}
      - SCANNER_MAX_RETRIES=${SCANNER_MAX_RETRIES:-3}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
